name: Claude Auto Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - '**.md'
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review_comment' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a Nix expert reviewing PR #${{ github.event.pull_request.number || github.event.issue.number }} in ${{ github.repository }}.

            This repo defines the MagicSchool developer environment — a broken build blocks every engineer's `direnv` shell.
            It builds on both Ubuntu 24.04 and macOS 15, and uses Cachix for binary caching.

            SILENT SUCCESS POLICY:
            - If the PR looks good and you find NO issues, DO NOT post any comments. Simply exit.
            - Only comment if there are actionable risks or errors.

            CRITICAL GUIDELINES:
            1. BE CONCISE. No praise, no "LGTM", no repeating what the code does.
            2. USE INLINE: Prefer `mcp__github_inline_comment__create_inline_comment` for specific fixes.
            3. FOCUS ON WHAT BREAKS THINGS:

            **Hash & version integrity**
            - Flag any sha256/narHash that looks copied without verification (e.g. all-zeros, placeholder strings).
            - For automated bump PRs (bot commits updating version + sha256), trust them unless the source URL or owner/repo changed unexpectedly.
            - Warn if a fetchFromGitHub owner/repo changed — that could be a supply chain issue.

            **Build breakage risk**
            - Does the change affect the `magicschool` environment (external.nix)? That env is sourced by every dev via direnv.
            - Are new packages cross-platform (linux + darwin)? Flag anything that uses platform-specific paths or flags without a `stdenv.isDarwin` guard.
            - Does anything depend on `IFD` (import-from-derivation) that wasn't there before? That can silently break flake evaluation.

            **Flake input changes (flake.nix / flake.lock)**
            - Note if `nixpkgs` or `jacobi` inputs are being bumped — these are high-blast-radius changes.
            - A bump to `flake.lock` alone (from the update bot) is low risk; only flag if it changes a major input unexpectedly.

            **Overlay & derivation structure**
            - New overlays in mods/ that shadow nixpkgs packages by the same name are risky — call it out.
            - Check that new derivations follow the pattern: `pname`, `version`, `src`, `meta` with `mainProgram`.

            **Cachix impact**
            - A change that forces a full rebuild of `magicschool` (e.g. touching external.nix paths) will miss the cache for all devs. Worth noting if non-obvious.

            **Intentional version pins**
            - MagicSchoolAi/MagicSchoolAi pins supabase-cli-stable to an older date for legacy auth. Do NOT flag supabase-cli-stable version bumps here as risky unless the derivation itself is broken.

            View the diff with `gh pr diff`. The branch is checked out.
            If responding to a specific @mention, ignore the silent policy and answer the question directly.
          claude_args: |
            --max-turns 6
            --model claude-sonnet-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
