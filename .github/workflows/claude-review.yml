# Nix-ops Repo — Non-blocking, advisory AI reviewer.
#
# Uses anthropics/claude-code-action with the code-review plugin for
# deterministic multi-agent behavior and confidence-based filtering.
# See: https://github.com/anthropics/claude-plugins-official/tree/main/plugins/code-review
#
# ── Trigger design ────────────────────────────────────────────────────────────
# PR lifecycle events trigger automated review. 'synchronize' is intentionally
# omitted — Claude reviews once when a PR is opened or comes out of draft.
#
# @claude mentions in PR comments are handled by this same workflow (nix-ops
# has no separate general assistant workflow). The plugin's triage agent
# handles the distinction between an automated run and a direct mention.
#
# ── Cost controls ─────────────────────────────────────────────────────────────
#   - timeout-minutes: 15         — hard wall-clock ceiling
#   - concurrency group           — one review per PR at a time; see below
#   - paths-ignore (denylist)     — skips documentation files
#   - Model tiering via plugin    — haiku/sonnet/opus right-sized per task
#
# DO NOT set CLAUDE_CODE_SUBAGENT_MODEL — it overrides all subagent models to
# a single value, defeating the plugin's cost-efficient model tiering.
#
# ── Format spec ───────────────────────────────────────────────────────────────
# Review formatting and Nix-specific focus instructions live in
# .claude/resources/pr-review-format.md (versioned, diffable, editable without
# touching this workflow). Injected via --append-system-prompt for system-prompt
# priority, which yields better adherence than user-turn prompt instructions.

name: Claude PR Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]
    paths-ignore:
      - '**.md'
  # Interactive @claude mentions in PR conversations.
  # These triggers have no paths filter — @claude works on any PR regardless
  # of which files changed. The plugin's triage agent skips drafts.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# One review per PR at a time. cancel-in-progress is off for comment
# events so the action's own tracking comment doesn't kill the review.
concurrency:
  group: claude-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  review:
    # Non-blocking — never gates merges.
    continue-on-error: true
    # PR events: skip drafts (plugin also triages these, but this is a second layer).
    # Comment events: only respond to explicit @claude mentions.
    if: |
      (github.event_name == 'pull_request' && !github.event.pull_request.draft) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 50

      # Load the review format + focus spec from a versioned file in the repo.
      # Keeping it out of .claude/rules/ means it doesn't load in every Claude
      # session — only during PR review runs.
      - name: Load PR review format spec
        id: format-spec
        run: |
          {
            echo 'content<<SPEC_EOF'
            cat .claude/resources/pr-review-format.md
            echo 'SPEC_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Live progress checklist on the PR so devs know the review is running.
          track_progress: true
          # The code-review plugin provides a deterministic multi-agent pipeline
          # with confidence-based filtering. Only high-confidence issues are
          # posted as inline comments, keeping noise low.
          plugin_marketplaces: "https://github.com/anthropics/claude-plugins-official.git"
          plugins: "code-review@claude-plugins-official"
          prompt: "/code-review:code-review --comment"
          additional_permissions: |
            actions: read
          claude_args: |
            --model claude-fable-5
            --allowedTools "mcp__github_inline_comment__create_inline_comment"
            --append-system-prompt "${{ steps.format-spec.outputs.content }}"
